<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Buddy AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #chat-header {
            background: #0078D7;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        #chat-window {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .user-message {
            background: #0078D7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        #input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        #send-btn {
            background: #0078D7;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover { background: #005a9e; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">✈️ Trip Buddy AI</div>
    <div id="chat-window">
        <!-- Messages will appear here -->
        <div class="message ai-message">Hello! I'm your AI travel assistant. Where do you want to go today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const messageText = inputField.value.trim();

        if (messageText === "") return;

        // 1. Display User Message
        chatWindow.innerHTML += `<div class="message user-message">${messageText}</div>`;
        inputField.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight; // Scroll to bottom

        // 2. Add a temporary "Typing..." indicator
        const typingId = "typing-" + Date.now();
        chatWindow.innerHTML += `<div id="${typingId}" class="message ai-message"><em>Typing...</em></div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            // 3. Send the POST request to your Python FastAPI server
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });

            const data = await response.json();
            
            // 4. Remove "Typing..." and display the real AI response
            document.getElementById(typingId).remove();
            chatWindow.innerHTML += `<div class="message ai-message">${data.ai_response}</div>`;
            
        } catch (error) {
            // Handle if the server is off
            document.getElementById(typingId).remove();
            chatWindow.innerHTML += `<div class="message ai-message" style="color: red;">Error: Could not connect to the API. Is your Uvicorn server running?</div>`;
        }
        
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Allow pressing 'Enter' to send
    function handleEnter(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
